<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CFA Level II 개인 교재</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <button id="navToggle" class="nav-toggle" aria-label="메뉴 열기">☰</button>
  <div class="brand">
    <span class="brand-mark">CFA L2</span>
    <span class="brand-sub">개인 교재 · 2026</span>
  </div>
  <div class="topbar-tools">
    <div class="searchbox">
      <input id="searchInput" type="search" placeholder="개념 · 공식 · 키워드 검색" autocomplete="off">
      <div id="searchResults" class="search-results" hidden></div>
    </div>
    <button id="wrongNoteBtn" class="tool-btn" title="오답노트">오답노트 <span id="wrongCount" class="count-badge">0</span></button>
    <div class="progress-wrap" title="전체 학습 진행률">
      <svg class="progress-ring" width="34" height="34" viewBox="0 0 34 34">
        <circle class="ring-bg" cx="17" cy="17" r="14"></circle>
        <circle id="ringFill" class="ring-fill" cx="17" cy="17" r="14"></circle>
      </svg>
      <span id="progressPct" class="progress-pct">0%</span>
    </div>
  </div>
</header>

<div class="layout">
  <nav id="sidebar" class="sidebar" aria-label="교재 목차">
    <div class="sidebar-head">
      <span class="sidebar-title">목차</span>
      <span id="progressDetail" class="sidebar-progress">0 / 0 LOS</span>
      <button id="navClose" class="nav-close" aria-label="메뉴 닫기">×</button>
    </div>
    <div id="bookNav" class="book-nav"></div>
    <div class="sidebar-foot">
      마지막으로 본 LOS는 다음 방문 때 자동으로 열립니다.<br>
      data/bookN.json 교체만으로 내용이 갱신됩니다.
    </div>
  </nav>
  <div id="scrim" class="scrim" hidden></div>

  <main id="content" class="content">
    <div class="welcome" id="welcome">
      <p class="welcome-eyebrow">PERSONAL STUDY NOTES</p>
      <h1 class="welcome-title">CFA Level II<br>개인 온라인 교재</h1>
      <p class="welcome-desc">BOOK → Reading → LOS 단위로 정리한 학습 노트.<br>왼쪽 목차에서 BOOK을 선택해 시작하세요.</p>
      <div id="resumeCard"></div>
    </div>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
