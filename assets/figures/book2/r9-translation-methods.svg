<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Current rate versus temporal method">
<rect width="100%" height="100%" rx="28" fill="#fffaf3"/>
<style>
 text{font-family:Pretendard, 'Noto Sans KR', Arial, sans-serif;fill:#28231f}.muted{fill:#756b62}.small{font-size:22px}.tiny{font-size:18px}.label{font-size:24px;font-weight:700}.title{font-size:34px;font-weight:800}.mono{font-family:Consolas,'SFMono-Regular',monospace}
</style>
<text x="60" y="60" class="title" text-anchor="start">Foreign Currency Translation: Current Rate vs Temporal</text><rect x="70" y="140" width="500" height="430" rx="20" fill="#edf4f1" stroke="#2f7d73" stroke-width="2"/><text x="320.0" y="355.0" class="label" text-anchor="middle">Current Rate Method</text><rect x="630" y="140" width="500" height="430" rx="20" fill="#eef1f8" stroke="#4d74a8" stroke-width="2"/><text x="880.0" y="355.0" class="label" text-anchor="middle">Temporal Method</text><text x="110" y="220" class="small" text-anchor="start">• Assets &amp; Liabilities → current rate</text><text x="110" y="290" class="small" text-anchor="start">• Equity → historical rate</text><text x="110" y="360" class="small" text-anchor="start">• Income statement → avg rate</text><text x="110" y="430" class="small" text-anchor="start">• Translation gain/loss → OCI (CTA)</text><text x="670" y="220" class="small" text-anchor="start">• Monetary A/L → current rate</text><text x="670" y="290" class="small" text-anchor="start">• Nonmonetary → historical rate</text><text x="670" y="360" class="small" text-anchor="start">• Related expenses → matching rate</text><text x="670" y="430" class="small" text-anchor="start">• Remeasurement gain/loss → P&amp;L</text><text x="600" y="630" class="small" text-anchor="middle">핵심은 functional currency와 presentation currency 관계야.</text></svg>