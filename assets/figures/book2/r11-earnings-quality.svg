<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Earnings quality comparison">
<rect width="100%" height="100%" rx="28" fill="#fffaf3"/>
<style>
 text{font-family:Pretendard, 'Noto Sans KR', Arial, sans-serif;fill:#28231f}.muted{fill:#756b62}.small{font-size:22px}.tiny{font-size:18px}.label{font-size:24px;font-weight:700}.title{font-size:34px;font-weight:800}.mono{font-family:Consolas,'SFMono-Regular',monospace}
</style>
<text x="60" y="60" class="title" text-anchor="start">Earnings Quality: 높은 질의 이익은 무엇이 다른가</text><rect x="110" y="130" width="420" height="440" rx="20" fill="#edf4f1" stroke="#4d8b64" stroke-width="2"/><text x="320.0" y="350.0" class="label" text-anchor="middle">Higher-quality earnings</text><rect x="670" y="130" width="420" height="440" rx="20" fill="#f8e8e8" stroke="#c35b5b" stroke-width="2"/><text x="880.0" y="350.0" class="label" text-anchor="middle">Lower-quality earnings</text><text x="150" y="220" class="small" text-anchor="start">✓ Persistent / sustainable</text><text x="150" y="285" class="small" text-anchor="start">✓ Cash conversion 강함</text><text x="150" y="350" class="small" text-anchor="start">✓ Low abnormal accruals</text><text x="150" y="415" class="small" text-anchor="start">✓ Conservative assumptions</text><text x="150" y="480" class="small" text-anchor="start">✓ Core operations 중심</text><text x="710" y="220" class="small" text-anchor="start">✕ One-off items 의존</text><text x="710" y="285" class="small" text-anchor="start">✕ Cash flow와 괴리</text><text x="710" y="350" class="small" text-anchor="start">✕ Aggressive accruals</text><text x="710" y="415" class="small" text-anchor="start">✕ Estimate manipulation 위험</text><text x="710" y="480" class="small" text-anchor="start">✕ Non-core gains 비중 큼</text><text x="600" y="635" class="small" text-anchor="middle">Reported EPS가 높다는 것과 earnings quality가 높다는 것은 다르다.</text></svg>