<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Dividend versus share repurchase">
<rect width="100%" height="100%" rx="28" fill="#fffaf3"/>
<style>
 text{font-family:Pretendard, 'Noto Sans KR', Arial, sans-serif;fill:#28231f}.muted{fill:#756b62}.small{font-size:22px}.tiny{font-size:18px}.label{font-size:24px;font-weight:700}.title{font-size:34px;font-weight:800}.mono{font-family:Consolas,'SFMono-Regular',monospace}
</style>
<text x="60" y="60" class="title" text-anchor="start">Payout Policy: Dividend vs Share Repurchase</text><rect x="100" y="150" width="430" height="380" rx="20" fill="#edf4f1" stroke="#2f7d73" stroke-width="2"/><text x="315.0" y="340.0" class="label" text-anchor="middle">Cash Dividend</text><rect x="670" y="150" width="430" height="380" rx="20" fill="#eef1f8" stroke="#4d74a8" stroke-width="2"/><text x="885.0" y="340.0" class="label" text-anchor="middle">Share Repurchase</text><text x="140" y="240" class="small" text-anchor="start">• 지속성 기대가 강함</text><text x="140" y="305" class="small" text-anchor="start">• 모든 주주에게 현금 분배</text><text x="140" y="370" class="small" text-anchor="start">• 배당 cut은 부정적 signal 가능</text><text x="140" y="435" class="small" text-anchor="start">• 세금 체계 영향</text><text x="710" y="240" class="small" text-anchor="start">• 더 유연한 payout</text><text x="710" y="305" class="small" text-anchor="start">• 저평가 시 value-accretive 가능</text><text x="710" y="370" class="small" text-anchor="start">• share count 감소 → EPS 영향</text><text x="710" y="435" class="small" text-anchor="start">• financing source가 중요</text><text x="600" y="620" class="small" text-anchor="middle">CFA 함정: debt-funded buyback은 interest expense까지 같이 봐.</text></svg>