<text x="60" y="60" class="title" text-anchor="start">Residual Income: Book Value + Future Excess Returns</text><rect x="110" y="250" width="300" height="160" rx="20" fill="#eef1f8" stroke="#4d74a8" stroke-width="2"/><text x="260.0" y="314.0" class="label" text-anchor="middle">Current Book Value</text><text x="260.0" y="346.0" class="label" text-anchor="middle">B₀</text><text x="470" y="340" class="title" text-anchor="middle">+</text><rect x="540" y="180" width="520" height="300" rx="20" fill="#edf4f1" stroke="#4d8b64" stroke-width="2"/><text x="800.0" y="314.0" class="label" text-anchor="middle">PV of future residual income</text><text x="800.0" y="346.0" class="label" text-anchor="middle">RIₜ = NIₜ − rBₜ₋₁</text><text x="800" y="270" class="label" text-anchor="middle">Positive RI</text><text x="800" y="330" class="small" text-anchor="middle">ROE &gt; r</text><text x="800" y="400" class="small" text-anchor="middle">Value creation</text><text x="600" y="620" class="small" text-anchor="middle">Intrinsic value = current book value + PV of future residual income.</text></svg>