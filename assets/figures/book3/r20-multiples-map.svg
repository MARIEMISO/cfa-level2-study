<text x="60" y="60" class="title" text-anchor="start">Multiples: Price-based vs Enterprise-value-based</text><rect x="100" y="140" width="450" height="390" rx="20" fill="#edf4f1" stroke="#2f7d73" stroke-width="2"/><text x="325.0" y="335.0" class="label" text-anchor="middle">Price Multiples</text><rect x="650" y="140" width="450" height="390" rx="20" fill="#eef1f8" stroke="#4d74a8" stroke-width="2"/><text x="875.0" y="335.0" class="label" text-anchor="middle">Enterprise Value Multiples</text><text x="150" y="230" class="small" text-anchor="start">• P/E → equity earnings</text><text x="150" y="295" class="small" text-anchor="start">• P/B → book equity</text><text x="150" y="360" class="small" text-anchor="start">• P/S → sales</text><text x="150" y="425" class="small" text-anchor="start">• P/CF → cash flow</text><text x="700" y="230" class="small" text-anchor="start">• EV/EBITDA</text><text x="700" y="295" class="small" text-anchor="start">• EV/EBIT</text><text x="700" y="360" class="small" text-anchor="start">• EV/Sales</text><text x="700" y="425" class="small" text-anchor="start">• Capital-structure neutral perspective</text><text x="600" y="620" class="small" text-anchor="middle">Numerator와 denominator의 stakeholder perspective를 맞춰야 해.</text></svg>