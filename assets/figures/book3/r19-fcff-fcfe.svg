<text x="60" y="60" class="title" text-anchor="start">FCFF vs FCFE: cash-flow bridge</text><rect x="90" y="150" width="300" height="120" rx="20" fill="#edf4f1" stroke="#2f7d73" stroke-width="2"/><text x="240.0" y="194.0" class="label" text-anchor="middle">Operating Cash Flow</text><text x="240.0" y="226.0" class="label" text-anchor="middle">after tax</text><line x1="390" y1="210" x2="520" y2="210" stroke="#8a4f2d" stroke-width="3"/><polygon points="520,210 506.143593539449,218.0 506.143593539449,202.0" fill="#8a4f2d"/><rect x="520" y="140" width="260" height="140" rx="20" fill="#f6dfca" stroke="#8a4f2d" stroke-width="2"/><text x="650.0" y="194.0" class="label" text-anchor="middle">FCFF</text><text x="650.0" y="226.0" class="label" text-anchor="middle">Cash flow to all capital providers</text><line x1="780" y1="210" x2="910" y2="210" stroke="#4d74a8" stroke-width="3"/><polygon points="910,210 896.143593539449,218.0 896.143593539449,202.0" fill="#4d74a8"/><rect x="910" y="150" width="220" height="120" rx="20" fill="#eef1f8" stroke="#4d74a8" stroke-width="2"/><text x="1020.0" y="194.0" class="label" text-anchor="middle">− Interest after tax</text><text x="1020.0" y="226.0" class="label" text-anchor="middle">+ Net borrowing</text><line x1="1040" y1="270" x2="1040" y2="420" stroke="#4d74a8" stroke-width="3"/><polygon points="1040,420 1032.0,406.143593539449 1048.0,406.143593539449" fill="#4d74a8"/><rect x="880" y="420" width="320" height="120" rx="20" fill="#eaf4ec" stroke="#4d8b64" stroke-width="2"/><text x="1040.0" y="464.0" class="label" text-anchor="middle">FCFE</text><text x="1040.0" y="496.0" class="label" text-anchor="middle">Cash flow to equity holders</text><text x="600" y="625" class="small" text-anchor="middle">Discount FCFF at WACC, FCFE at required return on equity.</text></svg>