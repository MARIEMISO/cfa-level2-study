<rect x="350" y="330" width="220" height="100" rx="14" class="box"/><text x="390" y="375" class="s">Higher ROE</text><text x="390" y="405" class="m">g capacity ↑</text>
<rect x="700" y="330" width="260" height="100" rx="14" class="warn"/><text x="740" y="375" class="s">But check source</text><text x="740" y="405" class="m">leverage-driven ROE?</text></svg>