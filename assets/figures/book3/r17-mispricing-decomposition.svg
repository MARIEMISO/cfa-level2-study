<text x="60" y="60" class="title" text-anchor="start">Perceived Mispricing = Actual Mispricing + Valuation Error</text><rect x="100" y="220" width="280" height="160" rx="20" fill="#f6dfca" stroke="#8a4f2d" stroke-width="2"/><text x="240.0" y="284.0" class="label" text-anchor="middle">IV_analyst − P</text><text x="240.0" y="316.0" class="label" text-anchor="middle">Perceived mispricing</text><text x="465" y="315" class="title" text-anchor="middle">=</text><rect x="520" y="150" width="260" height="130" rx="20" fill="#edf4f1" stroke="#2f7d73" stroke-width="2"/><text x="650.0" y="199.0" class="label" text-anchor="middle">IV_actual − P</text><text x="650.0" y="231.0" class="label" text-anchor="middle">Actual mispricing</text><text x="830" y="245" class="title" text-anchor="middle">+</text><rect x="880" y="330" width="260" height="130" rx="20" fill="#f8e8e8" stroke="#c35b5b" stroke-width="2"/><text x="1010.0" y="379.0" class="label" text-anchor="middle">IV_analyst − IV_actual</text><text x="1010.0" y="411.0" class="label" text-anchor="middle">Valuation error</text><line x1="380" y1="300" x2="520" y2="215" stroke="#8a4f2d" stroke-width="3"/><polygon points="520,215 512.3075418256174,229.02947209396612 504.00389167774915,215.35287185041847" fill="#8a4f2d"/><line x1="380" y1="330" x2="880" y2="395" stroke="#8a4f2d" stroke-width="3"/><polygon points="880,395 865.2278948551665,401.14694310938233 867.2905385392404,385.28045323189053" fill="#8a4f2d"/><text x="600" y="600" class="small" text-anchor="middle">“싸 보인다”는 판단에는 시장의 오류와 내 모델의 오류가 함께 섞일 수 있어.</text></svg>