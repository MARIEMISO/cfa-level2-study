<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Option payoff diagrams">
<rect width="100%" height="100%" rx="28" fill="#fffaf3"/>
<style>
 text{font-family:Pretendard, 'Noto Sans KR', Arial, sans-serif;fill:#28231f}.muted{fill:#756b62}.small{font-size:22px}.tiny{font-size:18px}.label{font-size:24px;font-weight:700}.title{font-size:34px;font-weight:800}.mono{font-family:Consolas,'SFMono-Regular',monospace}
</style>
<text x="60" y="60" class="title" text-anchor="start">Option Payoffs at Expiration</text><text x="230" y="155" class="label" text-anchor="middle">Long Call</text><line x1="120" y1="530" x2="380" y2="530" stroke="#756b62" stroke-width="2"/><line x1="120" y1="530" x2="120" y2="220" stroke="#756b62" stroke-width="2"/><line x1="250" y1="220" x2="250" y2="530" stroke="#e7d8c6" stroke-width="2" stroke-dasharray="6 6"/><polyline points="120,450 250,450 380,280" fill="none" stroke="#2f7d73" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="250" y="560" class="tiny" text-anchor="middle">K</text><text x="580" y="155" class="label" text-anchor="middle">Long Put</text><line x1="470" y1="530" x2="730" y2="530" stroke="#756b62" stroke-width="2"/><line x1="470" y1="530" x2="470" y2="220" stroke="#756b62" stroke-width="2"/><line x1="600" y1="220" x2="600" y2="530" stroke="#e7d8c6" stroke-width="2" stroke-dasharray="6 6"/><polyline points="470,280 600,450 730,450" fill="none" stroke="#4d74a8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="600" y="560" class="tiny" text-anchor="middle">K</text><text x="930" y="155" class="label" text-anchor="middle">Short Call</text><line x1="820" y1="530" x2="1080" y2="530" stroke="#756b62" stroke-width="2"/><line x1="820" y1="530" x2="820" y2="220" stroke="#756b62" stroke-width="2"/><line x1="950" y1="220" x2="950" y2="530" stroke="#e7d8c6" stroke-width="2" stroke-dasharray="6 6"/><polyline points="820,350 950,350 1080,520" fill="none" stroke="#c35b5b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="950" y="560" class="tiny" text-anchor="middle">K</text><text x="600" y="635" class="small" text-anchor="middle">Payoff와 option value는 다르다: expiration 이전에는 time value가 존재.</text></svg>