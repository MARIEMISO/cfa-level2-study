<text x="60" y="60" class="title" text-anchor="start">CDS Cash Flows: Protection Buyer vs Seller</text><rect x="90" y="210" width="330" height="200" rx="20" fill="#eef1f8" stroke="#4d74a8" stroke-width="2"/><text x="255.0" y="310.0" class="label" text-anchor="middle">Protection Buyer</text><rect x="780" y="210" width="330" height="200" rx="20" fill="#edf4f1" stroke="#4d8b64" stroke-width="2"/><text x="945.0" y="310.0" class="label" text-anchor="middle">Protection Seller</text><line x1="420" y1="265" x2="780" y2="265" stroke="#d68a4c" stroke-width="4"/><polygon points="780,265 766.143593539449,273.0 766.143593539449,257.0" fill="#d68a4c"/><text x="600" y="240" class="small" text-anchor="middle">Periodic CDS premium</text><line x1="780" y1="360" x2="420" y2="360" stroke="#c35b5b" stroke-width="4"/><polygon points="420,360 433.856406460551,352.0 433.856406460551,368.0" fill="#c35b5b"/><text x="600" y="400" class="small" text-anchor="middle">Credit event 발생 시 protection payment</text><rect x="470" y="480" width="260" height="90" rx="20" fill="#fff" stroke="#8a4f2d" stroke-width="2"/><text x="600.0" y="525.0" class="label" text-anchor="middle">Reference Entity</text><text x="600" y="625" class="small" text-anchor="middle">CDS spread는 expected loss와 risk premium의 영향을 받는다.</text></svg>