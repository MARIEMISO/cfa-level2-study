<text x="60" y="60" class="title" text-anchor="start">Interest Rate Swap: Fixed vs Floating Cash Flows</text><rect x="110" y="190" width="330" height="220" rx="20" fill="#eef1f8" stroke="#4d74a8" stroke-width="2"/><text x="275.0" y="300.0" class="label" text-anchor="middle">Fixed-rate payer</text><rect x="760" y="190" width="330" height="220" rx="20" fill="#edf4f1" stroke="#2f7d73" stroke-width="2"/><text x="925.0" y="300.0" class="label" text-anchor="middle">Floating-rate payer</text><line x1="440" y1="255" x2="760" y2="255" stroke="#8a4f2d" stroke-width="4"/><polygon points="760,255 746.143593539449,263.0 746.143593539449,247.0" fill="#8a4f2d"/><text x="600" y="230" class="small" text-anchor="middle">Fixed leg</text><line x1="760" y1="350" x2="440" y2="350" stroke="#2f7d73" stroke-width="4"/><polygon points="440,350 453.856406460551,342.0 453.856406460551,358.0" fill="#2f7d73"/><text x="600" y="390" class="small" text-anchor="middle">Floating leg</text><text x="600" y="560" class="label" text-anchor="middle">At inception: fixed rate is set so swap value ≈ 0</text></svg>