<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Yield curve shapes">
<rect width="100%" height="100%" rx="28" fill="#fffaf3"/>
<style>
 text{font-family:Pretendard, 'Noto Sans KR', Arial, sans-serif;fill:#28231f}.muted{fill:#756b62}.small{font-size:22px}.tiny{font-size:18px}.label{font-size:24px;font-weight:700}.title{font-size:34px;font-weight:800}.mono{font-family:Consolas,'SFMono-Regular',monospace}
</style>
<text x="60" y="60" class="title" text-anchor="start">Yield Curve Shapes and Forward-rate intuition</text><text x="230" y="150" class="label" text-anchor="middle">Upward sloping</text><line x1="100" y1="500" x2="420" y2="500" stroke="#756b62" stroke-width="2"/><line x1="100" y1="500" x2="100" y2="220" stroke="#756b62" stroke-width="2"/><polyline points="100,430 180,400 260,375 340,355 420,340" fill="none" stroke="#2f7d73" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="600" y="150" class="label" text-anchor="middle">Flat</text><line x1="470" y1="500" x2="790" y2="500" stroke="#756b62" stroke-width="2"/><line x1="470" y1="500" x2="470" y2="220" stroke="#756b62" stroke-width="2"/><polyline points="470,385 550,385 630,385 710,385 790,385" fill="none" stroke="#d68a4c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="970" y="150" class="label" text-anchor="middle">Inverted</text><line x1="840" y1="500" x2="1160" y2="500" stroke="#756b62" stroke-width="2"/><line x1="840" y1="500" x2="840" y2="220" stroke="#756b62" stroke-width="2"/><polyline points="840,340 920,355 1000,375 1080,400 1160,430" fill="none" stroke="#c35b5b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="600" y="625" class="small" text-anchor="middle">Forward rates는 future spot rate의 단순 forecast가 아니라 no-arbitrage 관계에서 나온다.</text></svg>