<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650">
<rect width="1100" height="650" rx="28" fill="#fbfaf7"/>
<text x="550" y="55" text-anchor="middle" font-size="34" font-family="Arial" font-weight="700" fill="#222">REIT Valuation Stack</text>
<rect x="100" y="105" width="900" height="100" rx="20" fill="#e8f0ff" stroke="#5677b8" stroke-width="3"/>
<text x="550" y="145" text-anchor="middle" font-size="26" font-family="Arial" font-weight="700">1. NAVPS</text><text x="550" y="180" text-anchor="middle" font-size="20" font-family="Arial">Forecast NOI ÷ cap rate → asset value − debt → per share</text>
<rect x="100" y="240" width="900" height="100" rx="20" fill="#fff0e5" stroke="#c8793b" stroke-width="3"/>
<text x="550" y="280" text-anchor="middle" font-size="26" font-family="Arial" font-weight="700">2. Relative Value</text><text x="550" y="315" text-anchor="middle" font-size="20" font-family="Arial">Forward FFO/AFFO per share × justified peer multiple</text>
<rect x="100" y="375" width="900" height="100" rx="20" fill="#e9f7ec" stroke="#4a9660" stroke-width="3"/>
<text x="550" y="415" text-anchor="middle" font-size="26" font-family="Arial" font-weight="700">3. DCF</text><text x="550" y="450" text-anchor="middle" font-size="20" font-family="Arial">Discount future distributable cash flows + terminal value</text>
<text x="550" y="555" text-anchor="middle" font-size="22" font-family="Arial" fill="#444">Triangulate. A low P/FFO is not automatically undervaluation.</text>
</svg>
