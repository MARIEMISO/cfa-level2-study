<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Callable and putable bond value relationships">
<rect width="100%" height="100%" rx="28" fill="#fffaf3"/>
<style>
 text{font-family:Pretendard, 'Noto Sans KR', Arial, sans-serif;fill:#28231f}.muted{fill:#756b62}.small{font-size:22px}.tiny{font-size:18px}.label{font-size:24px;font-weight:700}.title{font-size:34px;font-weight:800}.mono{font-family:Consolas,'SFMono-Regular',monospace}
</style>
<text x="60" y="60" class="title" text-anchor="start">Embedded Options: Straight Bond ± Option</text><rect x="420" y="120" width="360" height="100" rx="20" fill="#f6dfca" stroke="#8a4f2d" stroke-width="2"/><text x="600.0" y="170.0" class="label" text-anchor="middle">Option-free straight bond</text><rect x="120" y="360" width="360" height="130" rx="20" fill="#f8e8e8" stroke="#c35b5b" stroke-width="2"/><text x="300.0" y="409.0" class="label" text-anchor="middle">Callable bond</text><text x="300.0" y="441.0" class="label" text-anchor="middle">= Straight bond − Call option</text><rect x="720" y="360" width="360" height="130" rx="20" fill="#eaf4ec" stroke="#4d8b64" stroke-width="2"/><text x="900.0" y="409.0" class="label" text-anchor="middle">Putable bond</text><text x="900.0" y="441.0" class="label" text-anchor="middle">= Straight bond + Put option</text><line x1="520" y1="220" x2="300" y2="360" stroke="#c35b5b" stroke-width="3"/><polygon points="300,360 307.39511255158396,345.8115430596063 315.98512042667454,359.3101268633201" fill="#c35b5b"/><line x1="680" y1="220" x2="900" y2="360" stroke="#4d8b64" stroke-width="3"/><polygon points="900,360 884.0148795733255,359.3101268633201 892.604887448416,345.8115430596063" fill="#4d8b64"/><text x="600" y="620" class="small" text-anchor="middle">Volatility ↑ → embedded option value ↑; effect on bond price depends on who owns the option.</text></svg>