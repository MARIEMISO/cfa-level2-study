<text x="60" y="60" class="title" text-anchor="start">Time Series: Stationary vs Unit Root</text><rect x="70" y="120" width="490" height="450" rx="22" fill="#fff" stroke="#e7d8c6" stroke-width="2"/><text x="315" y="165" class="label" text-anchor="middle">Covariance stationary</text><line x1="130" y1="500" x2="510" y2="500" stroke="#756b62" stroke-width="2"/><line x1="130" y1="500" x2="130" y2="210" stroke="#756b62" stroke-width="2"/><polyline points="140,360.0 154,409.5997459547983 168,392.6501165783281 182,383.99958300800364 196,385.7087938033237 210,332.77671824735836 224,297.6245741917771 238,334.7393430397354 252,357.1542763581243 266,360.57068321849493 280,405.2075431481223 294,419.2603400346173 308,364.07543671499417 322,337.23441796553305 336,340.3065862788316 350,311.9735273082573 364,318.85483777239386 378,383.68351884972543 392,403.16932657395637 406,384.7218666999183 420,395.19032438125794 434,374.2683722009919 448,311.5939131508526 462,309.44735666444404 476,346.18357571017503 490,348.181273406868" fill="none" stroke="#2f7d73" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><line x1="130" y1="360" x2="510" y2="360" stroke="#756b62" stroke-width="2" stroke-dasharray="8 8"/><text x="320" y="535" class="tiny" text-anchor="middle">mean reversion around a stable mean</text><rect x="640" y="120" width="490" height="450" rx="22" fill="#fff" stroke="#e7d8c6" stroke-width="2"/><text x="885" y="165" class="label" text-anchor="middle">Unit root / Random walk</text><line x1="700" y1="500" x2="1080" y2="500" stroke="#756b62" stroke-width="2"/><line x1="700" y1="500" x2="700" y2="210" stroke="#756b62" stroke-width="2"/><polyline points="710,342 724,364 738,352 752,382 766,377 780,405 794,421 808,399 822,434 836,452 850,442 864,467 878,452 892,484 906,506 920,498 934,526 948,538 962,518 976,548 990,564 1004,582 1018,577 1032,602 1046,620 1060,608" fill="none" stroke="#c35b5b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><text x="890" y="535" class="tiny" text-anchor="middle">shock의 효과가 영구적일 수 있음</text><text x="600" y="625" class="small" text-anchor="middle">Unit root가 있으면 first differencing을 검토해.</text></svg>