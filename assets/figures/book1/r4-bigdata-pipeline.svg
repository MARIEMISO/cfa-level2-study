<text x="60" y="60" class="title" text-anchor="start">Big Data Project: 분석 파이프라인</text><rect x="60" y="260" width="130" height="100" rx="18" fill="#edf4f1" stroke="#2f7d73" stroke-width="2"/><text x="125.0" y="310.0" class="label" text-anchor="middle">Conceptualize</text><line x1="190" y1="310" x2="210" y2="310" stroke="#8a4f2d" stroke-width="3"/><polygon points="210,310 196.14359353944897,318.0 196.14359353944897,302.0" fill="#8a4f2d"/><rect x="220" y="260" width="130" height="100" rx="18" fill="#f2e6d7" stroke="#d68a4c" stroke-width="2"/><text x="285.0" y="310.0" class="label" text-anchor="middle">Collect</text><line x1="350" y1="310" x2="370" y2="310" stroke="#8a4f2d" stroke-width="3"/><polygon points="370,310 356.143593539449,318.0 356.143593539449,302.0" fill="#8a4f2d"/><rect x="380" y="260" width="130" height="100" rx="18" fill="#edf4f1" stroke="#2f7d73" stroke-width="2"/><text x="445.0" y="310.0" class="label" text-anchor="middle">Prepare / Wrangle</text><line x1="510" y1="310" x2="540" y2="310" stroke="#8a4f2d" stroke-width="3"/><polygon points="540,310 526.143593539449,318.0 526.143593539449,302.0" fill="#8a4f2d"/><rect x="550" y="260" width="130" height="100" rx="18" fill="#f2e6d7" stroke="#d68a4c" stroke-width="2"/><text x="615.0" y="310.0" class="label" text-anchor="middle">Explore</text><line x1="680" y1="310" x2="700" y2="310" stroke="#8a4f2d" stroke-width="3"/><polygon points="700,310 686.143593539449,318.0 686.143593539449,302.0" fill="#8a4f2d"/><rect x="710" y="260" width="130" height="100" rx="18" fill="#edf4f1" stroke="#2f7d73" stroke-width="2"/><text x="775.0" y="310.0" class="label" text-anchor="middle">Train</text><line x1="840" y1="310" x2="860" y2="310" stroke="#8a4f2d" stroke-width="3"/><polygon points="860,310 846.143593539449,318.0 846.143593539449,302.0" fill="#8a4f2d"/><rect x="870" y="260" width="130" height="100" rx="18" fill="#f2e6d7" stroke="#d68a4c" stroke-width="2"/><text x="935.0" y="310.0" class="label" text-anchor="middle">Evaluate</text><line x1="1000" y1="310" x2="1020" y2="310" stroke="#8a4f2d" stroke-width="3"/><polygon points="1020,310 1006.143593539449,318.0 1006.143593539449,302.0" fill="#8a4f2d"/><rect x="1030" y="260" width="130" height="100" rx="18" fill="#edf4f1" stroke="#2f7d73" stroke-width="2"/><text x="1095.0" y="310.0" class="label" text-anchor="middle">Tune / Deploy</text><text x="600" y="160" class="label" text-anchor="middle">Data leakage는 pipeline 경계를 깨뜨리는 대표 함정</text><rect x="380" y="470" width="440" height="100" rx="20" fill="#fff" stroke="#c35b5b" stroke-width="2"/><text x="600.0" y="520.0" class="label" text-anchor="middle">Train / Validation / Test 분리</text><text x="600" y="625" class="small" text-anchor="middle">평가 metric은 문제 목적과 class imbalance를 같이 봐야 해.</text></svg>