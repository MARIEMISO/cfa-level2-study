<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620"><rect width="1100" height="620" rx="30" fill="#fbfaf7"/><text x="550" y="55" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700">Fundamental Law of Active Management</text><rect x="80" y="130" width="230" height="120" rx="18" fill="#e8f0ff" stroke="#5677b8" stroke-width="3"/><text x="195" y="175" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700">IC</text><text x="195" y="212" text-anchor="middle" font-family="Arial" font-size="18">Forecast skill</text><rect x="435" y="130" width="230" height="120" rx="18" fill="#fff0e5" stroke="#c8793b" stroke-width="3"/><text x="550" y="175" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700">√Breadth</text><text x="550" y="212" text-anchor="middle" font-family="Arial" font-size="18">Independent opportunities</text><rect x="790" y="130" width="230" height="120" rx="18" fill="#e9f7ec" stroke="#4a9660" stroke-width="3"/><text x="905" y="175" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700">TC</text><text x="905" y="212" text-anchor="middle" font-family="Arial" font-size="18">Implementation transfer</text><text x="550" y="330" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700">IR ≈ TC × IC × √BR</text><rect x="280" y="390" width="540" height="110" rx="22" fill="#f2efe8" stroke="#555" stroke-width="3"/><text x="550" y="435" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Expected Active Return</text><text x="550" y="472" text-anchor="middle" font-family="Arial" font-size="20">≈ IR × Active Risk</text><text x="550" y="555" text-anchor="middle" font-family="Arial" font-size="18" fill="#555">More positions do not create breadth if the bets are highly correlated.</text></svg>