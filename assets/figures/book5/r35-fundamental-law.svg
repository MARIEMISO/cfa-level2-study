<text x="60" y="60" class="title" text-anchor="start">Fundamental Law of Active Management</text><rect x="390" y="125" width="420" height="110" rx="20" fill="#f6dfca" stroke="#8a4f2d" stroke-width="2"/><text x="600.0" y="180.0" class="label" text-anchor="middle">IR ≈ TC × IC × √Breadth</text><circle cx="200" cy="390" r="95" fill="#fff" stroke="#2f7d73" stroke-width="4"/><text x="200" y="380" class="title" text-anchor="middle">IC</text><text x="200" y="425" class="tiny" text-anchor="middle">Forecast skill</text><line x1="200" y1="295" x2="600" y2="235" stroke="#2f7d73" stroke-width="3"/><polygon points="600,235 587.4836195544839,244.96695643329008 585.1101723076,229.14397478739733" fill="#2f7d73"/><circle cx="570" cy="390" r="95" fill="#fff" stroke="#4d74a8" stroke-width="4"/><text x="570" y="380" class="title" text-anchor="middle">Breadth</text><text x="570" y="425" class="tiny" text-anchor="middle">Independent bets</text><line x1="570" y1="295" x2="600" y2="235" stroke="#4d74a8" stroke-width="3"/><polygon points="600,235 600.9586441740674,250.9712554718634 586.6478091180688,243.81583794386407" fill="#4d74a8"/><circle cx="940" cy="390" r="95" fill="#fff" stroke="#4d8b64" stroke-width="4"/><text x="940" y="380" class="title" text-anchor="middle">TC</text><text x="940" y="425" class="tiny" text-anchor="middle">Ability to implement</text><line x1="940" y1="295" x2="600" y2="235" stroke="#4d8b64" stroke-width="3"/><polygon points="600,235 615.0358439379216,229.52977175298284 612.2552785953769,245.28630869406985" fill="#4d8b64"/><text x="600" y="635" class="small" text-anchor="middle">좋은 signal도 constraints 때문에 portfolio에 못 옮기면 TC가 낮아져.</text></svg>