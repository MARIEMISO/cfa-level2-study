<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620"><rect width="1100" height="620" rx="30" fill="#fbfaf7"/><text x="550" y="55" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700">Market Risk Measurement Stack</text><rect x="90" y="120" width="270" height="120" rx="20" fill="#e8f0ff" stroke="#5677b8" stroke-width="3"/><text x="225" y="168" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700">Sensitivities</text><text x="225" y="205" text-anchor="middle" font-family="Arial" font-size="18">Delta · DV01 · Vega</text><rect x="415" y="120" width="270" height="120" rx="20" fill="#fff0e5" stroke="#c8793b" stroke-width="3"/><text x="550" y="168" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700">VaR / ES</text><text x="550" y="205" text-anchor="middle" font-family="Arial" font-size="18">Distribution / tail quantiles</text><rect x="740" y="120" width="270" height="120" rx="20" fill="#e9f7ec" stroke="#4a9660" stroke-width="3"/><text x="875" y="168" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700">Scenarios</text><text x="875" y="205" text-anchor="middle" font-family="Arial" font-size="18">Historical · Hypothetical</text><rect x="220" y="340" width="660" height="145" rx="22" fill="#f2efe8" stroke="#555" stroke-width="3"/><text x="550" y="390" text-anchor="middle" font-family="Arial" font-size="27" font-weight="700">Risk Governance</text><text x="550" y="432" text-anchor="middle" font-family="Arial" font-size="22">Budgets · Limits · Capital · Hedges</text><text x="550" y="555" text-anchor="middle" font-family="Arial" font-size="18" fill="#555">No single measure is sufficient: local exposure, distribution and tail narratives are complementary.</text></svg>