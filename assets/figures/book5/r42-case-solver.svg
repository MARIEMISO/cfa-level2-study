<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
<rect width="1200" height="720" rx="30" fill="#fbfaf7"/>
<text x="600" y="58" text-anchor="middle" font-size="34" font-family="Arial" font-weight="700" fill="#222">Level II Ethics Case Solver</text>
<g font-family="Arial">
<rect x="90" y="120" width="1020" height="90" rx="22" fill="#e8f0ff" stroke="#5677b8" stroke-width="3"/>
<text x="600" y="158" text-anchor="middle" font-size="24" font-weight="700">Facts & Timeline</text><text x="600" y="190" text-anchor="middle" font-size="17">Who knew what, when, and what action followed?</text>
<path d="M600 210 V260" stroke="#555" stroke-width="4" marker-end="url(#b)"/>
<rect x="120" y="280" width="280" height="120" rx="20" fill="#e9f7ec" stroke="#4a9660" stroke-width="3"/>
<text x="260" y="320" text-anchor="middle" font-size="23" font-weight="700">Evaluate</text><text x="260" y="355" text-anchor="middle" font-size="17">Rule elements vs facts</text><text x="260" y="380" text-anchor="middle" font-size="17">Policy adequacy</text>
<rect x="460" y="280" width="280" height="120" rx="20" fill="#fff0e5" stroke="#c8793b" stroke-width="3"/>
<text x="600" y="320" text-anchor="middle" font-size="23" font-weight="700">Explain</text><text x="600" y="355" text-anchor="middle" font-size="17">Decisive fact</text><text x="600" y="380" text-anchor="middle" font-size="17">Match or exception</text>
<rect x="800" y="280" width="280" height="120" rx="20" fill="#f3eafd" stroke="#8662a8" stroke-width="3"/>
<text x="940" y="320" text-anchor="middle" font-size="23" font-weight="700">Act</text><text x="940" y="355" text-anchor="middle" font-size="17">Disclose / Consent</text><text x="940" y="380" text-anchor="middle" font-size="17">Stop / Escalate / Dissociate</text>
<path d="M400 340 H460 M740 340 H800" stroke="#555" stroke-width="4" marker-end="url(#b)"/>
<rect x="180" y="500" width="840" height="120" rx="24" fill="#fff7cf" stroke="#b79a29" stroke-width="3"/>
<text x="600" y="545" text-anchor="middle" font-size="24" font-weight="700">Final separation</text>
<text x="600" y="585" text-anchor="middle" font-size="20">Violation  ≠  Poor Practice  ≠  Failure to follow a Recommended Procedure</text>
<defs><marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#555"/></marker></defs>
</g></svg>