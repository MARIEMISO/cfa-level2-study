<text x="60" y="60" class="title" text-anchor="start">Ethics: Decision Map</text><rect x="430" y="90" width="340" height="90" rx="20" fill="#f6dfca" stroke="#8a4f2d" stroke-width="2"/><text x="600.0" y="135.0" class="label" text-anchor="middle">Potential ethical issue?</text><rect x="100" y="260" width="330" height="130" rx="20" fill="#eef1f8" stroke="#4d74a8" stroke-width="2"/><text x="265.0" y="309.0" class="label" text-anchor="middle">Identify Standard</text><text x="265.0" y="341.0" class="label" text-anchor="middle">I–VII</text><rect x="770" y="260" width="330" height="130" rx="20" fill="#edf4f1" stroke="#2f7d73" stroke-width="2"/><text x="935.0" y="309.0" class="label" text-anchor="middle">Identify duties</text><text x="935.0" y="341.0" class="label" text-anchor="middle">Client · Employer · Market</text><line x1="520" y1="180" x2="265" y2="260" stroke="#4d74a8" stroke-width="3"/><polygon points="265,260 275.82632095862397,248.2190503565774 280.6157621512212,263.485394157981" fill="#4d74a8"/><line x1="680" y1="180" x2="935" y2="260" stroke="#2f7d73" stroke-width="3"/><polygon points="935,260 919.3842378487789,263.485394157981 924.173679041376,248.2190503565774" fill="#2f7d73"/><rect x="360" y="480" width="480" height="100" rx="20" fill="#eaf4ec" stroke="#4d8b64" stroke-width="2"/><text x="600.0" y="514.0" class="label" text-anchor="middle">Choose action that protects integrity</text><text x="600.0" y="546.0" class="label" text-anchor="middle">and avoids / discloses conflicts</text><line x1="265" y1="390" x2="520" y2="480" stroke="#4d74a8" stroke-width="3"/><polygon points="520,480 504.2709817076238,482.9322318390766 509.596103591386,467.84438650175036" fill="#4d74a8"/><line x1="935" y1="390" x2="680" y2="480" stroke="#2f7d73" stroke-width="3"/><polygon points="680,480 690.4038964086141,467.84438650175036 695.7290182923762,482.9322318390766" fill="#2f7d73"/><text x="600" y="640" class="small" text-anchor="middle">Ethics vignette는 “가장 방어적인 행동”보다 Standard의 정확한 의무를