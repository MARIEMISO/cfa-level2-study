<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620"><rect width="1100" height="620" rx="30" fill="#fbfaf7"/><text x="550" y="55" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700">Multifactor Risk Decomposition</text><rect x="110" y="120" width="260" height="130" rx="20" fill="#e8f0ff" stroke="#5677b8" stroke-width="3"/><text x="240" y="170" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700">Factor Exposures</text><text x="240" y="210" text-anchor="middle" font-family="Arial" font-size="18">b = weighted betas</text><rect x="420" y="120" width="260" height="130" rx="20" fill="#fff0e5" stroke="#c8793b" stroke-width="3"/><text x="550" y="170" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700">Factor Covariance</text><text x="550" y="210" text-anchor="middle" font-family="Arial" font-size="18">ΣF</text><rect x="730" y="120" width="260" height="130" rx="20" fill="#e9f7ec" stroke="#4a9660" stroke-width="3"/><text x="860" y="170" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700">Specific Risk</text><text x="860" y="210" text-anchor="middle" font-family="Arial" font-size="18">Residual / idiosyncratic</text><path d="M240 250 L430 360" stroke="#555" stroke-width="4"/><path d="M550 250 L550 340" stroke="#555" stroke-width="4"/><path d="M860 250 L670 360" stroke="#555" stroke-width="4"/><rect x="300" y="340" width="500" height="145" rx="22" fill="#f2efe8" stroke="#555" stroke-width="3"/><text x="550" y="390" text-anchor="middle" font-family="Arial" font-size="27" font-weight="700">Portfolio Variance</text><text x="550" y="432" text-anchor="middle" font-family="Arial" font-size="23">b′ΣF b + Specific Variance</text><text x="550" y="555" text-anchor="middle" font-family="Arial" font-size="18" fill="#555">Active risk uses benchmark-relative factor exposures and residual positions.</text></svg>