<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620"><rect width="1100" height="620" rx="30" fill="#fbfaf7"/><text x="550" y="55" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700">Macro Shock → Market Value</text><rect x="60" y="120" width="250" height="120" rx="18" fill="#e8f0ff" stroke="#5677b8" stroke-width="3"/><text x="185" y="170" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Expected CF</text><text x="185" y="205" text-anchor="middle" font-family="Arial" font-size="18">Amount / Timing</text><rect x="425" y="120" width="250" height="120" rx="18" fill="#fff0e5" stroke="#c8793b" stroke-width="3"/><text x="550" y="170" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Default-free Curve</text><text x="550" y="205" text-anchor="middle" font-family="Arial" font-size="18">Level / Slope</text><rect x="790" y="120" width="250" height="120" rx="18" fill="#e9f7ec" stroke="#4a9660" stroke-width="3"/><text x="915" y="170" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Risk Premium</text><text x="915" y="205" text-anchor="middle" font-family="Arial" font-size="18">Credit / Equity / Liquidity</text><path d="M185 240 L430 370" stroke="#555" stroke-width="4"/><path d="M550 240 L550 350" stroke="#555" stroke-width="4"/><path d="M915 240 L670 370" stroke="#555" stroke-width="4"/><rect x="330" y="350" width="440" height="150" rx="24" fill="#f2efe8" stroke="#555" stroke-width="3"/><text x="550" y="410" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700">Asset Value</text><text x="550" y="455" text-anchor="middle" font-family="Arial" font-size="22">PV of expected cash flows</text><text x="550" y="550" text-anchor="middle" font-family="Arial" font-size="18" fill="#555">Markets react to expectation revisions, not raw data levels alone.</text></svg>