<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
<rect width="1200" height="700" rx="30" fill="#fbfaf7"/>
<text x="600" y="58" text-anchor="middle" font-size="34" font-family="Arial" font-weight="700" fill="#222">Standards Application Flow</text>
<g font-family="Arial" text-anchor="middle">
<rect x="70" y="120" width="190" height="90" rx="18" fill="#e8f0ff" stroke="#5677b8" stroke-width="3"/><text x="165" y="160" font-size="23" font-weight="700">1. Actor</text><text x="165" y="190" font-size="16">Who acted?</text>
<rect x="300" y="120" width="190" height="90" rx="18" fill="#e9f7ec" stroke="#4a9660" stroke-width="3"/><text x="395" y="160" font-size="23" font-weight="700">2. Duty</text><text x="395" y="190" font-size="16">To whom?</text>
<rect x="530" y="120" width="190" height="90" rx="18" fill="#fff0e5" stroke="#c8793b" stroke-width="3"/><text x="625" y="160" font-size="23" font-weight="700">3. Timing</text><text x="625" y="190" font-size="16">Before/after what?</text>
<rect x="760" y="120" width="190" height="90" rx="18" fill="#f3eafd" stroke="#8662a8" stroke-width="3"/><text x="855" y="160" font-size="23" font-weight="700">4. Facts</text><text x="855" y="190" font-size="16">Material? Public?</text>
<rect x="990" y="120" width="140" height="90" rx="18" fill="#fff7cf" stroke="#b79a29" stroke-width="3"/><text x="1060" y="160" font-size="23" font-weight="700">5. Rule</text><text x="1060" y="190" font-size="16">Exact Standard</text>
<path d="M260 165 H300 M490 165 H530 M720 165 H760 M950 165 H990" stroke="#555" stroke-width="4" marker-end="url(#a)"/>
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#555"/></marker></defs>
<rect x="180" y="310" width="840" height="250" rx="26" fill="#f2f1ed" stroke="#555" stroke-width="3"/>
<text x="600" y="360" font-size="27" font-weight="700">Cross-check the rule elements</text>
<text x="330" y="420" font-size="20">MNPI → Material AND Nonpublic?</text>
<text x="330" y="462" font-size="20">Suitability → Client + IPS + Portfolio context?</text>
<text x="820" y="420" font-size="20">Conflict → Disclosure or Written Consent?</text>
<text x="820" y="462" font-size="20">Supervisor → Prevent + Detect + Act?</text>
<text x="600" y="520" font-size="19" fill="#555">Then separate: Violation?  |  Poor practice?  |  Corrective action?</text>
</g></svg>