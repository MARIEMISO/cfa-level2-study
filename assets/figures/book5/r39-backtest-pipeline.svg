iddle">Robustness checks</text><line x1="995" y1="320" x2="1022" y2="320" stroke="#8a4f2d" stroke-width="3"/><polygon points="1022,320 1008.143593539449,328.0 1008.143593539449,312.0" fill="#8a4f2d"/><rect x="1030" y="270" width="130" height="100" rx="16" fill="#edf4f1" stroke="#2f7d73" stroke-width="2"/><text x="1095.0" y="320.0" class="label" text-anchor="middle">Decision</text><rect x="360" y="480" width="480" height="95" rx="20" fill="#f8e8e8" stroke="#c35b5b" stroke-width="2"/><text x="600.0" y="527.5" class="label" text-anchor="middle">Watch: look-ahead · survivorship · overfitting</text><text x="600" y="625" class="small" text-anchor="middle">Backtest가 좋다는 것과 future performance가 보장된다는 것은 다르다.</text></svg>