<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620"><rect width="1100" height="620" rx="30" fill="#fbfaf7"/><text x="550" y="55" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700">ETF Liquidity & Creation / Redemption</text><rect x="80" y="150" width="260" height="130" rx="20" fill="#e8f0ff" stroke="#5677b8" stroke-width="3"/><text x="210" y="198" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700">Secondary Market</text><text x="210" y="238" text-anchor="middle" font-family="Arial" font-size="18">Investors trade ETF shares</text><rect x="420" y="150" width="260" height="130" rx="20" fill="#fff0e5" stroke="#c8793b" stroke-width="3"/><text x="550" y="198" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700">Authorized Participant</text><text x="550" y="238" text-anchor="middle" font-family="Arial" font-size="18">Arbitrage / inventory bridge</text><rect x="760" y="150" width="260" height="130" rx="20" fill="#e9f7ec" stroke="#4a9660" stroke-width="3"/><text x="890" y="198" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700">Primary Market</text><text x="890" y="238" text-anchor="middle" font-family="Arial" font-size="18">Create / redeem basket</text><path d="M340 215 L420 215" stroke="#555" stroke-width="5"/><path d="M680 215 L760 215" stroke="#555" stroke-width="5"/><rect x="205" y="375" width="690" height="120" rx="22" fill="#f2efe8" stroke="#555" stroke-width="3"/><text x="550" y="420" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700">Premium → buy basket, create ETF, sell ETF</text><text x="550" y="462" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700">Discount → buy ETF, redeem, sell basket</text><text x="550" y="555" text-anchor="middle" font-family="Arial" font-size="18" fill="#555">Arbitrage is limited by liquidity, taxes, fees, market hours and AP balance sheets.</text></svg>