<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Value at Risk methods comparison">
<rect width="100%" height="100%" rx="28" fill="#fffaf3"/>
<style>
 text{font-family:Pretendard, 'Noto Sans KR', Arial, sans-serif;fill:#28231f}.muted{fill:#756b62}.small{font-size:22px}.tiny{font-size:18px}.label{font-size:24px;font-weight:700}.title{font-size:34px;font-weight:800}.mono{font-family:Consolas,'SFMono-Regular',monospace}
</style>
<text x="60" y="60" class="title" text-anchor="start">VaR Methods: Parametric vs Historical vs Monte Carlo</text><rect x="70" y="190" width="300" height="300" rx="20" fill="#fff" stroke="#2f7d73" stroke-width="2"/><text x="220.0" y="340.0" class="label" text-anchor="middle">Parametric</text><text x="220" y="320" class="small" text-anchor="middle">Fast</text><text x="220" y="360" class="small" text-anchor="middle">Distribution assumption</text><rect x="450" y="190" width="300" height="300" rx="20" fill="#fff" stroke="#4d74a8" stroke-width="2"/><text x="600.0" y="340.0" class="label" text-anchor="middle">Historical</text><text x="600" y="320" class="small" text-anchor="middle">Actual past returns</text><text x="600" y="360" class="small" text-anchor="middle">Path dependent</text><rect x="830" y="190" width="300" height="300" rx="20" fill="#fff" stroke="#d68a4c" stroke-width="2"/><text x="980.0" y="340.0" class="label" text-anchor="middle">Monte Carlo</text><text x="980" y="320" class="small" text-anchor="middle">Flexible</text><text x="980" y="360" class="small" text-anchor="middle">Model + simulation risk</text><text x="600" y="620" class="small" text-anchor="middle">VaR는 “최대손실”이 아니라 특정 horizon·confidence에서의 threshold다.</text></svg>